[supervisord]
nodaemon=true

[program:php-fpm]
command=docker-php-entrypoint php-fpm
autostart=true
autorestart=true
priority=1
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout

[program:nginx]
command=/usr/sbin/nginx -g 'daemon off;'
autostart=true
autorestart=true
priority=2
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout

[program:laravel-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/artisan queue:work --tries=3 --timeout=90
autostart=true
autorestart=true
stopwaitsecs=3600
numprocs=1
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stderr

[program:scheduler]
command=php /var/www/html/artisan schedule:work-optimized
autostart=true
autorestart=true
priority=20
numprocs=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0