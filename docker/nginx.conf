worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 600;
    gzip on;
    gzip_types text/css application/javascript text/javascript application/x-javascript image/svg+xml;

    server {
        listen 8080;  # Cloud Run default port
        server_name _;

        root /var/www/html/public;
        index index.php index.html index.htm;

        error_log /var/log/nginx/error.log;
        access_log /var/log/nginx/access.log;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param APP_ENV production;
            fastcgi_param APP_DEBUG false;
            fastcgi_param HTTP_PROXY "";
            proxy_read_timeout 600s;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            fastcgi_read_timeout 600s;
        }

        location ~* \.(jpg|jpeg|gif|png|css|js|ico|svg|woff2|woff|ttf|otf|eot)$ {
            expires max;
            log_not_found off;
        }

        location ~ /\.ht {
            deny all;
        }
    }
}
