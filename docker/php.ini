[PHP]
; Max execution time for scripts
max_execution_time = 600
request_terminate_timeout = 600s
; Memory limit for PHP scripts (adjust based on workload)
memory_limit = 500M

; Maximum file upload size
upload_max_filesize = 50M
post_max_size = 50M

; Hide errors in production
display_errors = Off
log_errors = On
error_log = /var/log/php-error.log

; Improve performance by enabling realpath cache
realpath_cache_size = 512K
realpath_cache_ttl = 600

; Set timezone to avoid warnings
date.timezone = UTC

; Enable OPcache for better performance
[opcache]
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1

; Improve session handling
[Session]
session.use_strict_mode = 1
session.use_cookies = 1
session.cookie_httponly = 1
session.cookie_secure = 1
session.gc_maxlifetime = 86400
session.save_path = "/var/lib/php/sessions"

; Disable dangerous functions for security
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source

; FPM-specific settings
[global]
pid = /run/php/php8.3-fpm.pid
error_log = /var/log/php8.3-fpm.log

[www]
listen = 127.0.0.1:9000
pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 10
pm.process_idle_timeout = 10s
pm.max_requests = 500
